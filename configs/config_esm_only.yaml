# ECHO-ESM: Pure ESM-2 language model baseline (no GCN)
device: cuda
classifier_hidden: 512

contrastive:
  lambda_enc: 0.5
  lambda_int: 2.0
  temperature: 0.1

dataset:
  mask_prob: 0.1
  columns:
    label: label
    peptide: peptide
    tcr: binding_TCR
  test_csv: datasets/panpep/majority_testing_dataset.csv
  train_csv: datasets/panpep/train_joint.csv
  val_csv: datasets/panpep/val_joint.csv

esm:
  encoder1: esm2_t33_650M_UR50D
  encoder2: esm2_t33_650M_UR50D

evaluation:
  batch_size: 32
  metrics:
  - auc
  - accuracy
  wandb:
    log: true

use_lora: True
use_gcn: false

lora:
  presets:
    esm2_t33_650M_UR50D:
      alpha: 32
      bias: none
      dropout: 0.1
      layers_to_transform: [32, 31, 30, 29, 28]
      r: 8
      task_type: FEATURE_EXTRACTION

model:
  checkpoint_dir: runs/esm_only/

training:
  second_contrastive: True
  batch_size: 32
  dropout: 0.3
  cross_attn_dropout: 0.3
  early_stopping:
    patience: 10
  epochs: 200
  focal_gamma: 2.0
  lambda_int: 2.0
  lora_alpha: 32
  lora_dropout: 0.0
  lora_r: 32
  lr: 0.00005
  output_dir: runs/esm_only/
  temperature: 0.05
  weight_decay: 0.0001

wandb:
  project: ECHO-ESM-Only
  run: run1
