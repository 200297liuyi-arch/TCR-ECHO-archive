# ECHO-Structure: TCR-ECHO + deepAntigen 3D structural learning
# Two-stage fine-tuning on PDB structures for atom-level contact prediction.
device: cuda
classifier_hidden: 512

# ── ESM Language Track (unchanged from baseline) ──────────────────
esm:
  encoder1: esm2_t33_650M_UR50D
  encoder2: esm2_t33_650M_UR50D

use_lora: True
lora:
  presets:
    esm2_t33_650M_UR50D:
      alpha: 32
      bias: none
      dropout: 0.1
      layers_to_transform: [32, 31, 30, 29, 28]
      r: 8

contrastive:
  lambda_enc: 0.5
  lambda_int: 2.0
  temperature: 0.1

# ── GCN Physics Track ────────────────────────────────────────────
use_gcn: true
fusion_gcn: true

gcn:
  hidden_size: 128
  depth: 2
  k: 10
  heads: 4
  in_channels: 25

gcn_freeze_encoder: true

# ── Pre-trained checkpoints ──────────────────────────────────────
# Path to ECHO sequence-level pretrained model (Phase 1+2)
echo_pretrained: ""
# Path to deepAntigen seq-level weights (for GCN encoder init)
gcn_pretrained: ""

# ── Structure Dataset ────────────────────────────────────────────
structure:
  pdb_csv: /path/to/pdb_metadata.csv
  data_dir: /path/to/pdb_data/

# ── Structure Training Hyperparameters ───────────────────────────
structure_training:
  batch_size: 4              # small due to ESM2 + GCN + structure overhead
  stage1_epochs: 200
  stage2_epochs: 200
  lr: 0.0001
  weight_decay: 0.0001
  cosine_annealing: true
  contact_threshold: 5.0     # Angstroms cutoff for contact definition
  focal_alpha: 0.7           # WeightedFocalLoss alpha
  save_dir: runs/structure/

# ── Sequence-level training (standard ECHO, unchanged) ───────────
dataset:
  mask_prob: 0.1
  columns:
    label: label
    peptide: seq_2
    tcr: seq_1

training:
  second_contrastive: True
  batch_size: 8
  dropout: 0.08
  epochs: 200
  focal_gamma: 2.0
  lr: 0.00005
  weight_decay: 0.00005
  output_dir: runs/structure/

wandb:
  project: ECHO-Structure
  run: run1
