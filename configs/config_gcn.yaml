# ECHO-GCN: TCR-ECHO + deepAntigen atom-graph — Joint Pretraining
device: cuda
classifier_hidden: 512

contrastive:
  lambda_enc: 0.5
  lambda_int: 2.0
  temperature: 0.1

dataset:
  mask_prob: 0.1
  columns:
    label: label
    peptide: peptide
    tcr: binding_TCR
  test_csv: datasets/panpep/majority_testing_dataset.csv
  train_csv: datasets/panpep/train_joint.csv
  val_csv: datasets/panpep/val_joint.csv

graph_cache_dir: datasets/panpep/graph_cache     # precomputed pickle cache

esm:
  encoder1: esm2_t33_650M_UR50D
  encoder2: esm2_t33_650M_UR50D

evaluation:
  batch_size: 32
  metrics:
  - auc
  - accuracy
  wandb:
    log: true

use_lora: True
lora:
  presets:
    esmc_300m:
      alpha: 32
      bias: none
      dropout: 0.1
      layers_to_transform: [30, 29, 28, 27, 26]
      r: 8
      task_type: FEATURE_EXTRACTION
    esmc_600M:
      alpha: 32
      bias: none
      dropout: 0.1
      layers_to_transform: [30, 29, 28, 27]
      r: 16
      task_type: FEATURE_EXTRACTION
    esm2_t12_35M_UR50D:
      alpha: 32
      bias: none
      dropout: 0.1
      layers_to_transform: [12, 11, 10, 9, 8]
      r: 16
      task_type: FEATURE_EXTRACTION
    esm2_t33_650M_UR50D:
      alpha: 32
      bias: none
      dropout: 0.1
      layers_to_transform: [32, 31, 30, 29, 28]
      r: 8
      task_type: FEATURE_EXTRACTION
    esm2_t6_8M_UR50D:
      alpha: 32
      bias: none
      dropout: 0.05
      layers_to_transform: [6, 5, 4, 3, 2]
      r: 8
      task_type: FEATURE_EXTRACTION

# ══════════════════════════════════════════════════════════════════
#  GCN Track 2 — Joint Pretraining (ALL params trainable)
# ══════════════════════════════════════════════════════════════════
use_gcn: true
fusion_gcn: true

gcn:
  hidden_size: 128
  depth: 2
  k: 10
  heads: 4
  in_channels: 25

gcn_freeze_encoder: false       # Joint pretraining: train EVERYTHING

# auxiliary GCN loss — forces gradient through GCN track
lambda_gcn_aux: 1.0

# ── pre-trained GCN checkpoint (optional) ───────────────────────
gcn_pretrained: ""

model:
  checkpoint_dir: runs/best_model_gcn_joint/

training:
  second_contrastive: True
  batch_size: 128              # 5090 32GB
  dropout: 0.08
  early_stopping:
    patience: 15
  epochs: 50                  # joint pretraining: knowledge injection
  focal_gamma: 2.0
  lambda_int: 2.0
  lora_alpha: 32
  lora_dropout: 0.0
  lora_r: 32
  lr: 0.00005
  output_dir: runs/gcn_joint/
  temperature: 0.05
  weight_decay: 0.00005

wandb:
  project: ECHO-GCN-Joint
  run: run1
